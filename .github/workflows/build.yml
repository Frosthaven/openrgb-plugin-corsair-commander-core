name: Build Plugin

on:
  workflow_dispatch:

env:
  OPENRGB_TAG: release_candidate_1.0rc2

jobs:
  # ---------------------------------------------------------------------------
  # Linux (native x86_64 + QEMU-emulated ARM)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux ${{ matrix.label }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            native: true
          - label: arm64
            native: false
            qemu_arch: aarch64
            distro: ubuntu_latest
            experimental: true
          - label: armhf
            native: false
            qemu_arch: armv7
            distro: ubuntu_latest
            experimental: true

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Checkout OpenRGB source
        uses: actions/checkout@v4
        with:
          repository: CalcProgrammer1/OpenRGB
          ref: ${{ env.OPENRGB_TAG }}
          path: OpenRGB

      # --- Native x86_64 ---
      - name: Install dependencies (native)
        if: matrix.native
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential qtbase5-dev qtbase5-dev-tools qt5-qmake \
            libqt5svg5-dev libusb-1.0-0-dev libhidapi-dev libmbedtls-dev \
            pkgconf

      - name: Build plugin (native)
        if: matrix.native
        run: |
          export OPENRGB_DIR=${{ github.workspace }}/OpenRGB
          qmake CorsairCommanderCore.pro
          make -j$(nproc)

      # --- QEMU ARM ---
      - name: Build plugin (QEMU ${{ matrix.qemu_arch }})
        if: ${{ !matrix.native }}
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.qemu_arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y \
              build-essential qtbase5-dev qtbase5-dev-tools qt5-qmake \
              libqt5svg5-dev libusb-1.0-0-dev libhidapi-dev libmbedtls-dev \
              pkgconf findutils
          run: |
            export OPENRGB_DIR=${{ github.workspace }}/OpenRGB
            qmake CorsairCommanderCore.pro
            make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRGBCorsairCommanderCorePlugin-linux-${{ matrix.label }}
          path: libOpenRGBCorsairCommanderCorePlugin.so

  # ---------------------------------------------------------------------------
  # Windows x86_64 (MSYS2 / MinGW-w64)
  # Note: ARM64 builds are not possible — GitHub runners are x86_64 and
  # CLANGARM64 packages contain ARM64 binaries that cannot execute.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Checkout OpenRGB source
        uses: actions/checkout@v4
        with:
          repository: CalcProgrammer1/OpenRGB
          ref: ${{ env.OPENRGB_TAG }}
          path: OpenRGB

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-mbedtls
            pkgconf
            make

      - name: Build plugin
        shell: msys2 {0}
        run: |
          export OPENRGB_DIR=$(cygpath -u '${{ github.workspace }}/OpenRGB')
          qmake-qt5 CorsairCommanderCore.pro
          make -j$(nproc)

      - name: Collect artifact
        shell: msys2 {0}
        run: |
          # qmake on MinGW may place DLL in release/ or current dir
          if [ -f release/OpenRGBCorsairCommanderCorePlugin.dll ]; then
            cp release/OpenRGBCorsairCommanderCorePlugin.dll .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRGBCorsairCommanderCorePlugin-windows-x86_64
          path: OpenRGBCorsairCommanderCorePlugin.dll

  # ---------------------------------------------------------------------------
  # macOS (arm64 Apple Silicon + x86_64 Intel)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build (macOS ${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64
            runner: macos-latest
          - label: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Checkout OpenRGB source
        uses: actions/checkout@v4
        with:
          repository: CalcProgrammer1/OpenRGB
          ref: ${{ env.OPENRGB_TAG }}
          path: OpenRGB

      - name: Install dependencies
        run: |
          brew install qt@5 hidapi libusb mbedtls pkg-config 2>&1 | grep -v 'already installed'
          echo "$(brew --prefix qt@5)/bin" >> $GITHUB_PATH

      - name: Build plugin
        run: |
          export OPENRGB_DIR=${{ github.workspace }}/OpenRGB
          export PKG_CONFIG_PATH="$(brew --prefix hidapi)/lib/pkgconfig:$(brew --prefix qt@5)/lib/pkgconfig:$PKG_CONFIG_PATH"
          qmake CorsairCommanderCore.pro
          make -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRGBCorsairCommanderCorePlugin-macos-${{ matrix.label }}
          path: libOpenRGBCorsairCommanderCorePlugin.dylib

  # ---------------------------------------------------------------------------
  # Draft release with all artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create Draft Release
    needs: [build-linux, build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              ext="${file##*.}"
              cp "$file" "release/${name}.${ext}"
            done
          done
          ls -la release/

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ] && git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" --)
          else
            COMMITS=$(git log --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%H) %s" --)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- No new commits since last release"
          fi
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-${{ github.run_number }}
          name: Plugin Build ${{ github.run_number }}
          files: release/*
          body: |
            ${{ steps.notes.outputs.commits }}

            ---

            OpenRGB plugin for the Corsair Commander Core (Capellix / Capellix XT AIO).
            Install instructions are in the [README](https://github.com/${{ github.repository }}/blob/main/README.md).

            | Platform | Artifact |
            |---|---|
            | Linux x86_64 | `*-linux-x86_64.so` |
            | Windows x86_64 | `*-windows-x86_64.dll` |
            | macOS arm64 | `*-macos-arm64.dylib` |
            | macOS x86_64 | `*-macos-x86_64.dylib` |
